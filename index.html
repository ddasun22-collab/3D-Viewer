<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My AR</title>

  <!-- 1. Load A-Frame then MindAR (order matters) -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; }
  </style>
</head>
<body>

  <!-- 2. The whole AR scene in just HTML tags -->
  <a-scene
    mindar-image="imageTargetSrc: targets.mind;"
    color-space="sRGB"
    renderer="colorManagement: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <!-- 3. Load your GLB model as an asset -->
    <a-assets>
      <a-asset-item id="my-model" src="my-model.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- 4. Anchor: attach content to target image 0 -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- 5. Your 3D model, positioned above the target -->
      <a-gltf-model
        src="#my-model"
        scale="0.1 0.1 0.1"
        position="0 0 0"
        rotation="0 0 0">
      </a-gltf-model>

    </a-entity>

  </a-scene>

</body>
</html>
