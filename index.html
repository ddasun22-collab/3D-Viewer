<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR Debug</title>

  <!-- Updated: load Three.js first, then MindAR from unpkg -->
  <script src="https://unpkg.com/three@0.154.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.154.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://unpkg.com/mind-ar@1.2.2/dist/mindar-image-three.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #container { width: 100vw; height: 100vh; position: relative; }
    #log {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      z-index: 9999;
      background: rgba(0,0,0,0.85);
      color: #0f0;
      font-family: monospace;
      font-size: 13px;
      padding: 10px;
      box-sizing: border-box;
      max-height: 50vh;
      overflow-y: auto;
      pointer-events: none;
    }
    #log .err { color: #f55; }
    #log .ok  { color: #5f5; }
    #log .inf { color: #ff5; }
  </style>
</head>
<body>

<div id="log"></div>
<div id="container"></div>

<script>
  const log = (msg, type = 'inf') => {
    const el = document.getElementById('log');
    el.innerHTML += `<div class="${type}">[${type.toUpperCase()}] ${msg}</div>`;
    el.scrollTop = el.scrollHeight;
    console.log(msg);
  };

  window.onerror = (msg, src, line) => {
    log(`JS error: ${msg} (line ${line})`, 'err');
  };

  const start = async () => {
    try {

      log('Script loaded, starting...');

      if (!window.MINDAR) {
        log('MindAR failed to load', 'err');
        return;
      }
      log('MindAR loaded OK', 'ok');

      if (!window.THREE) {
        log('Three.js failed to load', 'err');
        return;
      }
      log('Three.js loaded OK', 'ok');

      log('Loading targets.mind...');
      const mindarThree = new window.MINDAR.IMAGE.MindARThree({
        container: document.getElementById("container"),
        imageTargetSrc: "targets.mind",
        webXR: false,
      });
      log('MindARThree created OK', 'ok');

      const { renderer, scene, camera } = mindarThree;

      const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
      scene.add(light);
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(5, 10, 7);
      scene.add(dirLight);
      log('Lights added', 'ok');

      log('Loading my-model.glb...');
      const loader = new THREE.GLTFLoader();
      loader.load(
        "my-model.glb",
        (gltf) => {
          log('GLB loaded OK', 'ok');
          const model = gltf.scene;
          model.scale.set(0.1, 0.1, 0.1);
          model.position.set(0, 0, 0);
          anchor.group.add(model);
          log('Model added to anchor', 'ok');
        },
        undefined,
        (err) => {
          log(`GLB load error: ${err.message}`, 'err');
        }
      );

      const anchor = mindarThree.addAnchor(0);
      log('Anchor created', 'ok');

      log('Starting camera... allow permission if prompted');
      await mindarThree.start();
      log('Camera started OK', 'ok');

      renderer.setAnimationLoop(() => {
        renderer.render(scene, camera);
      });

    } catch(err) {
      log(`Fatal error: ${err.message}`, 'err');
    }
  };

  start();
</script>

</body>
</html>
